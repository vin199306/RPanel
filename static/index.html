<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniPanel</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f6fa; color: #333; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
header { background: #2c3e50; color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
header h1 { font-size: 20px; }
nav button { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 6px 14px; margin-left: 8px; border-radius: 4px; cursor: pointer; }
nav button:hover { background: rgba(255,255,255,0.1); }
.card { background: #fff; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); padding: 20px; margin-bottom: 20px; }
.card h2 { font-size: 18px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
table { width: 100%; border-collapse: collapse; }
th, td { text-align: left; padding: 12px 10px; border-bottom: 1px solid #eee; font-size: 14px; }
th { background: #fafafa; font-weight: 600; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; }
.badge.running { background: #d4edda; color: #155724; }
.badge.stopped { background: #f8d7da; color: #721c24; }
.badge.error { background: #fff3cd; color: #856404; }
.btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; margin-right: 6px; }
.btn-primary { background: #3498db; color: #fff; }
.btn-success { background: #2ecc71; color: #fff; }
.btn-danger { background: #e74c3c; color: #fff; }
.btn-warning { background: #f1c40f; color: #333; }
.btn:hover { opacity: 0.9; }
form label { display: block; margin: 10px 0 5px; font-size: 14px; font-weight: 500; }
form input, form textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
form textarea { min-height: 60px; font-family: monospace; }
.actions { margin-top: 15px; }
.login-wrap { display: flex; align-items: center; justify-content: center; height: 100vh; }
.login-box { width: 360px; padding: 30px; background: #fff; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
.login-box h2 { margin-bottom: 20px; text-align: center; }
.hidden { display: none !important; }
.grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
.stat-item { background: #fafafa; padding: 15px; border-radius: 6px; }
.stat-item .value { font-size: 22px; font-weight: 700; margin-top: 6px; }
.stat-item .label { font-size: 12px; color: #888; }
.log-box { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 6px; height: 400px; overflow-y: auto; font-family: monospace; font-size: 13px; white-space: pre-wrap; }
.log-search { display: flex; gap: 10px; margin-bottom: 10px; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal .card { width: 600px; max-width: 90%; }
</style>
</head>
<body>
<div id="app">
  <div id="login-page" class="login-wrap">
    <div class="login-box">
      <h2>MiniPanel 登录</h2>
      <form id="login-form">
        <label>用户名</label>
        <input type="text" id="username" value="admin" required>
        <label>密码</label>
        <input type="password" id="password" value="password" required>
        <div class="actions">
          <button type="submit" class="btn btn-primary" style="width:100%">登录</button>
        </div>
        <p id="login-error" style="color:#e74c3c;margin-top:10px;font-size:13px;text-align:center;"></p>
      </form>
    </div>
  </div>

  <div id="main-page" class="hidden">
    <header>
      <h1>MiniPanel</h1>
      <nav>
        <button onclick="showTab('programs')">程序管理</button>
        <button onclick="showTab('monitor')">系统监控</button>
        <button onclick="showTab('info')">系统信息</button>
        <button onclick="logout()">退出</button>
      </nav>
    </header>
    <div class="container">
      <div id="tab-programs">
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
            <h2>程序列表</h2>
            <button class="btn btn-primary" onclick="openModal()">添加程序</button>
          </div>
          <table>
            <thead><tr><th>名称</th><th>命令</th><th>状态</th><th>PID</th><th>运行时长</th><th>操作</th></tr></thead>
            <tbody id="programs-tbody"></tbody>
          </table>
        </div>
      </div>

      <div id="tab-monitor" class="hidden">
        <div class="card">
          <h2>系统资源</h2>
          <div class="grid-4" id="system-stats"></div>
        </div>
        <div class="card">
          <h2>进程资源</h2>
          <table>
            <thead><tr><th>程序</th><th>PID</th><th>CPU%</th><th>内存(MB)</th><th>内存%</th><th>读字节</th><th>写字节</th></tr></thead>
            <tbody id="process-stats-tbody"></tbody>
          </table>
        </div>
      </div>

      <div id="tab-info" class="hidden">
        <div class="card">
          <h2>系统信息</h2>
          <div id="system-info" style="line-height:2;"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="modal" class="modal hidden">
    <div class="card">
      <h2 id="modal-title">添加程序</h2>
      <form id="program-form">
        <input type="hidden" id="p-id">
        <label>名称</label><input type="text" id="p-name" required>
        <label>启动命令</label><input type="text" id="p-command" required>
        <label>工作目录</label><input type="text" id="p-work_dir" required>
        <label>启动参数 (每行一个)</label><textarea id="p-args"></textarea>
        <label>环境变量 (KEY=VALUE, 每行一个)</label><textarea id="p-env"></textarea>
        <label><input type="checkbox" id="p-auto_start"> 自动启动</label>
        <div class="actions">
          <button type="submit" class="btn btn-primary">保存</button>
          <button type="button" class="btn" onclick="closeModal()">取消</button>
        </div>
      </form>
    </div>
  </div>

  <div id="log-modal" class="modal hidden">
    <div class="card" style="width:900px;max-width:95%;">
      <h2>日志查看</h2>
      <div class="log-search">
        <input type="text" id="log-keyword" placeholder="关键词搜索">
        <button class="btn btn-primary" onclick="searchLog()">搜索</button>
        <button class="btn" onclick="closeLogModal()">关闭</button>
      </div>
      <div id="log-box" class="log-box"></div>
    </div>
  </div>
</div>

<script>
let token = localStorage.getItem('minipanel_token') || '';
let currentLogId = null;
let ws = null;
const API = location.protocol + '//' + location.host;

async function api(url, opts={}) {
  opts.headers = opts.headers || {};
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  opts.headers['Content-Type'] = 'Content-Type' in opts.headers ? opts.headers['Content-Type'] : 'application/json';
  const res = await fetch(API + url, opts);
  if (res.status === 401) { logout(); return; }
  if (!res.ok) { const d = await res.json().catch(()=>({})); throw new Error(d.error || 'Request failed'); }
  return res.status === 204 ? null : res.json();
}

function logout() { token = ''; localStorage.removeItem('minipanel_token'); showLogin(); }
function showLogin() { document.getElementById('login-page').classList.remove('hidden'); document.getElementById('main-page').classList.add('hidden'); }
function showMain() { document.getElementById('login-page').classList.add('hidden'); document.getElementById('main-page').classList.remove('hidden'); }

async function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  try {
    const data = await api('/api/login', { method: 'POST', body: JSON.stringify({username, password}) });
    token = data.token; localStorage.setItem('minipanel_token', token); showMain(); loadPrograms(); startAutoRefresh();
  } catch (e) { document.getElementById('login-error').textContent = e.message; }
}
document.getElementById('login-form').addEventListener('submit', (e)=>{ e.preventDefault(); login(); });

function showTab(tab) {
  ['programs','monitor','info'].forEach(t=>document.getElementById('tab-'+t).classList.add('hidden'));
  document.getElementById('tab-'+tab).classList.remove('hidden');
  if (tab === 'monitor') loadMonitor();
  if (tab === 'info') loadInfo();
}

async function loadPrograms() {
  const data = await api('/api/programs');
  const tbody = document.getElementById('programs-tbody');
  tbody.innerHTML = '';
  (data.programs || []).forEach(p => {
    const tr = document.createElement('tr');
    const uptime = p.uptime_seconds != null ? fmtDuration(p.uptime_seconds) : '-';
    tr.innerHTML = `<td>${esc(p.name)}</td><td>${esc(p.command)}</td>
      <td><span class="badge ${p.status}">${p.status}</span></td>
      <td>${p.pid || '-'}</td><td>${uptime}</td>
      <td>
        ${p.status === 'running' ? `<button class="btn btn-danger" onclick="stopProgram('${p.id}')">停止</button><button class="btn btn-warning" onclick="restartProgram('${p.id}')">重启</button>` : `<button class="btn btn-success" onclick="startProgram('${p.id}')">启动</button>`}
        <button class="btn btn-primary" onclick="editProgram('${p.id}')">编辑</button>
        <button class="btn" onclick="deleteProgram('${p.id}')">删除</button>
        <button class="btn" onclick="openLog('${p.id}')">日志</button>
      </td>`;
    tbody.appendChild(tr);
  });
}

function fmtDuration(s) {
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm';
  if (s < 86400) return Math.floor(s/3600) + 'h' + Math.floor((s%3600)/60) + 'm';
  return Math.floor(s/86400) + 'd' + Math.floor((s%86400)/3600) + 'h';
}
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

async function startProgram(id) { await api('/api/programs/'+id+'/start', {method:'POST'}); loadPrograms(); }
async function stopProgram(id) { await api('/api/programs/'+id+'/stop', {method:'POST'}); loadPrograms(); }
async function restartProgram(id) { await api('/api/programs/'+id+'/restart', {method:'POST'}); loadPrograms(); }
async function deleteProgram(id) { if(!confirm('确定删除?')) return; await api('/api/programs/'+id, {method:'DELETE'}); loadPrograms(); }

async function editProgram(id) {
  const p = await api('/api/programs/'+id);
  document.getElementById('p-id').value = p.id;
  document.getElementById('p-name').value = p.name;
  document.getElementById('p-command').value = p.command;
  document.getElementById('p-work_dir').value = p.work_dir;
  document.getElementById('p-args').value = (p.args || []).join('\n');
  document.getElementById('p-env').value = Object.entries(p.env || {}).map(([k,v])=>k+'='+v).join('\n');
  document.getElementById('p-auto_start').checked = p.auto_start;
  document.getElementById('modal-title').textContent = '编辑程序';
  document.getElementById('modal').classList.remove('hidden');
}

function openModal() {
  document.getElementById('program-form').reset();
  document.getElementById('p-id').value = '';
  document.getElementById('modal-title').textContent = '添加程序';
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }

document.getElementById('program-form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const body = {
    name: document.getElementById('p-name').value,
    command: document.getElementById('p-command').value,
    work_dir: document.getElementById('p-work_dir').value,
    args: document.getElementById('p-args').value.split('\n').map(s=>s.trim()).filter(Boolean),
    env: Object.fromEntries(document.getElementById('p-env').value.split('\n').map(s=>s.trim()).filter(Boolean).map(s=>{ const i=s.indexOf('='); return i>0 ? [s.slice(0,i), s.slice(i+1)] : [s,'']; })),
    auto_start: document.getElementById('p-auto_start').checked,
  };
  const id = document.getElementById('p-id').value;
  if (id) { await api('/api/programs/'+id, {method:'PUT', body: JSON.stringify(body)}); }
  else { await api('/api/programs', {method:'POST', body: JSON.stringify(body)}); }
  closeModal(); loadPrograms();
});

async function loadMonitor() {
  const info = await api('/api/system/monitor');
  const el = document.getElementById('system-stats');
  el.innerHTML = `
    <div class="stat-item"><div class="label">CPU 使用率</div><div class="value">${info.cpu_usage_percent.toFixed(1)}%</div></div>
    <div class="stat-item"><div class="label">内存使用</div><div class="value">${info.used_memory_mb} / ${info.total_memory_mb} MB</div></div>
    <div class="stat-item"><div class="label">磁盘使用</div><div class="value">${info.disk_used_mb} / ${info.disk_total_mb} MB</div></div>
    <div class="stat-item"><div class="label">运行时间</div><div class="value">${fmtDuration(info.uptime_seconds)}</div></div>
  `;
  const data = await api('/api/programs');
  const tbody = document.getElementById('process-stats-tbody');
  tbody.innerHTML = '';
  for (const p of (data.programs || []).filter(p=>p.status==='running')) {
    try {
      const s = await api('/api/programs/'+p.id+'/stats');
      tbody.innerHTML += `<tr><td>${esc(p.name)}</td><td>${s.pid}</td><td>${s.cpu_percent.toFixed(1)}%</td><td>${s.memory_mb}</td><td>${s.memory_percent.toFixed(1)}%</td><td>${s.read_bytes}</td><td>${s.write_bytes}</td></tr>`;
    } catch(e) { tbody.innerHTML += `<tr><td>${esc(p.name)}</td><td colspan="6">无法获取</td></tr>`; }
  }
}

async function loadInfo() {
  const info = await api('/api/system/info');
  document.getElementById('system-info').innerHTML = `
    <div><strong>主机名:</strong> ${esc(info.hostname)}</div>
    <div><strong>操作系统:</strong> ${esc(info.os)}</div>
    <div><strong>架构:</strong> ${esc(info.arch)}</div>
    <div><strong>运行时间:</strong> ${fmtDuration(info.uptime_seconds)}</div>
    <div><strong>总内存:</strong> ${info.total_memory_mb} MB</div>
    <div><strong>磁盘:</strong> ${info.disk_used_mb} / ${info.disk_total_mb} MB</div>
  `;
}

function openLog(id) {
  currentLogId = id;
  document.getElementById('log-box').textContent = '';
  document.getElementById('log-modal').classList.remove('hidden');
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/api/programs/' + id + '/logs/ws');
  ws.onmessage = (ev) => { const box = document.getElementById('log-box'); box.textContent += ev.data; box.scrollTop = box.scrollHeight; };
  ws.onclose = () => { if (document.getElementById('log-modal').classList.contains('hidden') === false) setTimeout(()=>openLog(id), 2000); };
}
function closeLogModal() { document.getElementById('log-modal').classList.add('hidden'); if (ws) { ws.close(); ws = null; } }
async function searchLog() {
  const kw = document.getElementById('log-keyword').value;
  const data = await api('/api/programs/'+currentLogId+'/logs?keyword='+encodeURIComponent(kw));
  document.getElementById('log-box').textContent = (data.lines || []).join('\n');
}

function startAutoRefresh() {
  setInterval(()=>{ if (!document.getElementById('tab-programs').classList.contains('hidden')) loadPrograms(); }, 5000);
  setInterval(()=>{ if (!document.getElementById('tab-monitor').classList.contains('hidden')) loadMonitor(); }, 5000);
}

if (token) { showMain(); loadPrograms(); startAutoRefresh(); }
</script>
</body>
</html>
